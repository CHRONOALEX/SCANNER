<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro Carbon</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #8a2929;
            --carbon-dark: #121212;
            --carbon-light: #1e1e1e;
            --carbon-border: #333333;
            --accent: #ffc107;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --white: #ffffff;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            margin: 0; 
            background-color: var(--carbon-dark); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background-color 0.2s ease;
        }

        /* Indicador Visual de Éxito */
        body.scan-success { background-color: #064e3b !important; }

        /* Navegación Superior */
        nav { 
            display: flex; 
            background: #000000; 
            padding: 8px;
            gap: 8px;
            border-bottom: 1px solid var(--carbon-border);
        }

        nav button { 
            flex: 1; 
            padding: 12px 5px;
            background: var(--carbon-light); 
            border: 1px solid var(--carbon-border); 
            border-radius: 8px;
            color: var(--text-dim); 
            font-family: 'Lexend', sans-serif;
            font-weight: 600; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        nav button.active { 
            color: var(--white); 
            background: var(--primary);
            border-color: var(--primary);
        }

        .container {
            padding: 12px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .view { display: none; flex-direction: column; gap: 12px; }
        .view.active { display: flex; }

        .scan-card {
            background: var(--carbon-light);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--carbon-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        select, #scanner-input {
            background: #000000;
            color: var(--white);
            border: 1px solid var(--carbon-border);
            border-radius: 8px;
            padding: 14px;
            font-family: 'Lexend', sans-serif;
            font-size: 1em;
            outline: none;
        }

        #scanner-input:focus { border-color: var(--primary); }

        .btn-cam {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 1.4em;
            cursor: pointer;
        }

        .list-section {
            background: var(--carbon-light);
            border-radius: 12px;
            border: 1px solid var(--carbon-border);
            overflow: hidden;
        }

        .list-header {
            background: #252525;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-copy {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 0.8em;
            cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 15px; font-size: 0.7em; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--carbon-border); }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.9em; }
        
        .guia-text { font-weight: 600; color: var(--white); }
        .date-text { color: var(--text-dim); font-size: 0.85em; }

        #camera-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #reader { width: 90%; max-width: 500px; border-radius: 15px; overflow: hidden; border: 2px solid var(--carbon-border); }

        .btn-close-cam {
            margin-top: 25px;
            padding: 12px 40px;
            background: var(--white);
            border-radius: 25px;
            border: none;
            font-weight: bold;
            font-family: 'Lexend', sans-serif;
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="showView('scanner-view')" id="nav-scanner" class="active">
            <span>ESCÁNER</span>
        </button>
        <button onclick="showView('report-view')" id="nav-report">
            <span>HISTORIAL</span>
        </button>
    </nav>

    <div class="container">
        <div id="scanner-view" class="view active">
            <div class="scan-card">
                <select id="list-select" onchange="selectList(this.value)">
                    <option value="Inyección NextDay">Inyección NextDay</option>
                    <option value="Inyección NextDay MP">Inyección NextDay MP</option>
                    <option value="Inyección SameDay">Inyección SameDay</option>
                    <option value="Inyección Sameday MP">Inyección Sameday MP</option>
                    <option value="Sobre Dañado">Sobre Dañado</option>
                    <option value="Sobre sin Contenido">Sobre sin Contenido</option>
                    <option value="Mal Entregado">Mal Entregado</option>
                    <option value="Fuera de Cobertura">Fuera de Cobertura</option>
                    <option value="Devolución a Origen / 3 Intentos">Devolución a Origen / 3 Intentos</option>
                    <option value="No Manifestado(Rojo) / TBM">No Manifestado(Rojo) / TBM</option>
                </select>

                <div style="display: flex; gap: 8px;">
                    <input type="text" id="scanner-input" placeholder="Min. 8 caracteres..." autofocus autocomplete="off" style="flex-grow:1;">
                    <button class="btn-cam" onclick="startCamera()">📷</button>
                </div>
            </div>

            <div class="list-section">
                <div class="list-header">
                    <span id="list-title" style="font-weight:600; font-size:0.9em;">Lista Actual</span>
                    <span id="count-per-list" style="background:var(--primary); padding:2px 8px; border-radius:10px; font-size:0.8em;">0</span>
                </div>
                <table>
                    <tbody id="scanned-list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="report-view" class="view">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 5px;">
                <button class="btn-copy" onclick="copyToSheets()">📋 COPIAR PARA SHEETS</button>
            </div>
            <div class="list-section">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Guía</th>
                            <th>Servicio</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body"></tbody>
                </table>
            </div>
            <button onclick="resetAllData()" style="padding:15px; background:transparent; color:#8a2929; border:1px solid #8a2929; border-radius:10px; font-weight:bold; margin-top:20px; font-family:'Lexend';">LIMPIAR TODO</button>
        </div>
    </div>

    <div id="camera-modal">
        <div id="reader"></div>
        <button class="btn-close-cam" onclick="stopCamera()">CERRAR</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHoN08r8jxH4eIF4FASOb2IUrh6f0ss4qCI9xSV7rv1XsDnB5ygmWtvNXYT1qhXt7kkg/exec";
        let inventory = JSON.parse(localStorage.getItem('redpack_v5')) || {}; 
        let currentListName = localStorage.getItem('redpack_last_list') || 'Inyección NextDay';
        let html5QrCode;
        let globalBuffer = "";
        let lastKeyTime = Date.now();

        function getFormatDate() {
            const d = new Date();
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        }

        function successFeedback() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.frequency.setValueAtTime(880, context.currentTime);
            gain.gain.setValueAtTime(0.05, context.currentTime);
            osc.connect(gain); gain.connect(context.destination);
            osc.start(); osc.stop(context.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(50);
            document.body.classList.add('scan-success');
            setTimeout(() => document.body.classList.remove('scan-success'), 250);
        }

        // Interceptación Handheld Global
        document.addEventListener('keydown', (e) => {
            const currentTime = Date.now();
            if (e.target.tagName !== 'INPUT' || (currentTime - lastKeyTime < 40)) {
                if (e.key === 'Enter') {
                    if (globalBuffer.length >= 8) { // Validación de longitud mínima
                        processScan(globalBuffer.trim());
                    }
                    globalBuffer = "";
                } else if (e.key.length === 1) {
                    globalBuffer += e.key;
                }
            }
            lastKeyTime = currentTime;
        });

        async function processScan(code) {
            const dateKey = getFormatDate();
            if (!code || code.length < 8) return; // Doble validación de seguridad

            // Filtros de servicio
            if (currentListName === "No Manifestado(Rojo) / TBM") {
                if (!/^[a-zA-Z0-9]+$/.test(code)) return;
            } else {
                if (!/^\d+$/.test(code)) return;
            }
            
            // Duplicados
            if (!inventory[dateKey]) inventory[dateKey] = {};
            for (let L in inventory[dateKey]) {
                if (inventory[dateKey][L].includes(code)) {
                    alert(`Duplicado en ${L}`);
                    return;
                }
            }

            if (!inventory[dateKey][currentListName]) inventory[dateKey][currentListName] = [];
            inventory[dateKey][currentListName].push(code);
            localStorage.setItem('redpack_v5', JSON.stringify(inventory));
            
            successFeedback();
            updateUI();

            // Sincronización automática
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ fecha: dateKey, guia: code, servicio: currentListName })
            });

            document.getElementById('scanner-input').value = "";
            document.getElementById('scanner-input').focus();
        }

        function updateUI() {
            const dateKey = getFormatDate();
            const dayData = inventory[dateKey] || {};
            const list = dayData[currentListName] || [];
            
            document.getElementById('list-title').textContent = currentListName;
            document.getElementById('count-per-list').textContent = list.length;
            
            const rows = list.slice(-10).map((item) => `
                <tr>
                    <td><span class="guia-text">${item}</span></td>
                    <td style="text-align:right"><button onclick="deleteItem('${item}')" style="background:none; border:none; color:#8a2929; cursor:pointer; font-weight:bold;">✕</button></td>
                </tr>`).reverse().join('');
            
            document.getElementById('scanned-list-body').innerHTML = rows;
            renderReport();
        }

        function renderReport() {
            const dateKey = getFormatDate();
            const dayData = inventory[dateKey] || {};
            let rows = [];
            for (let L in dayData) {
                dayData[L].forEach(code => {
                    rows.push(`
                        <tr>
                            <td class="date-text">${dateKey}</td>
                            <td class="guia-text">${code}</td>
                            <td><span style="font-size:0.8em; color:var(--text-dim)">${L}</span></td>
                        </tr>`);
                });
            }
            document.getElementById('report-table-body').innerHTML = rows.reverse().join('');
        }

        function copyToSheets() {
            const dateKey = getFormatDate();
            const dayData = inventory[dateKey] || {};
            let tsvContent = ""; 

            for (let L in dayData) {
                dayData[L].forEach(code => {
                    tsvContent += `${dateKey}\t${code}\t${L}\n`;
                });
            }

            if (!tsvContent) {
                alert("No hay datos hoy.");
                return;
            }

            navigator.clipboard.writeText(tsvContent).then(() => {
                alert("¡Datos de hoy copiados!");
            });
        }

        function startCamera() {
            document.getElementById('camera-modal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: { width: 250, height: 150 } },
                (text) => { 
                    if (text.length >= 8) {
                        processScan(text); 
                        stopCamera(); 
                    }
                }
            );
        }

        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('camera-modal').style.display = 'none';
                    document.getElementById('scanner-input').focus();
                });
            }
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
            if(id === 'scanner-view') document.getElementById('scanner-input').focus();
        }

        function deleteItem(code) {
            const dateKey = getFormatDate();
            if (inventory[dateKey]) {
                for (let L in inventory[dateKey]) {
                    inventory[dateKey][L] = inventory[dateKey][L].filter(c => c !== code);
                }
            }
            localStorage.setItem('redpack_v5', JSON.stringify(inventory));
            updateUI();
        }

        function resetAllData() {
            if(confirm("¿Borrar todo?")) {
                inventory = {};
                localStorage.setItem('redpack_v5', JSON.stringify(inventory));
                updateUI();
            }
        }

        function selectList(name) {
            currentListName = name;
            localStorage.setItem('redpack_last_list', name);
            updateUI();
            document.getElementById('scanner-input').focus();
        }

        document.getElementById('scanner-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { 
                const val = e.target.value.trim();
                if (val.length >= 8) processScan(val);
                e.target.value = ''; 
            }
        });

        window.onload = () => {
            updateUI();
            setTimeout(() => document.getElementById('scanner-input').focus(), 500);
        };
    </script>
</body>
</html>
